name: PTH-01 One-Shot Tenant Codemod

on:
  pull_request:
    branches: [main]
    paths:
      - scripts/pth-apply.mjs
      - .github/workflows/pth-codemod.yml

permissions:
  contents: write

concurrency:
  group: pth-01-codemod
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PTH branch
        uses: actions/checkout@v4
        with:
          ref: agent/pth-01-public-tenant
          fetch-depth: 0

      - name: Apply consolidated matcher correction
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path("scripts/pth-apply.mjs")
          source = path.read_text()
          old = "// Usamos admin client porque o anon não tem mais SELECT em colunas"
          new = "// Usamos admin client server-side porque o anon não tem mais SELECT em colunas"
          count = source.count(old)
          if count != 1:
              raise SystemExit(f"expected one matcher signature, found {count}")
          path.write_text(source.replace(old, new))
          PY

      - name: Apply deterministic fail-closed codemod
        run: node scripts/pth-apply.mjs

      - name: Commit generated implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Codemod produced no changes"
            exit 1
          fi
          git commit -m "PTH-01 apply public tenant authority boundary"
          git push origin HEAD:agent/pth-01-public-tenant
