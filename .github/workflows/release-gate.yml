name: Release Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, build and deterministic route generation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_PUBLISHABLE_KEY: ci-placeholder-key
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-key
      CRON_SECRET: ci-placeholder-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Generate final lockfile
        shell: bash
        run: |
          set -o pipefail
          bun install 2>&1 | tee release-gate.log
          git diff --exit-code -- package.json

      - name: Commit lockfile and restore canonical workflow
        shell: bash
        run: |
          cat > .github/workflows/release-gate.yml <<'EOF'
          name: Release Gate

          on:
            pull_request:
              branches: [main]
            push:
              branches: [main]

          permissions:
            contents: read

          concurrency:
            group: release-gate-${{ github.ref }}
            cancel-in-progress: true

          jobs:
            verify:
              name: Typecheck, build and deterministic route generation
              runs-on: ubuntu-latest
              timeout-minutes: 30
              env:
                SUPABASE_URL: https://example.supabase.co
                SUPABASE_PUBLISHABLE_KEY: ci-placeholder-key
                VITE_SUPABASE_URL: https://example.supabase.co
                VITE_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-key
                CRON_SECRET: ci-placeholder-secret
              steps:
                - name: Checkout
                  uses: actions/checkout@v4

                - name: Setup Bun
                  uses: oven-sh/setup-bun@v2
                  with:
                    bun-version: 1.3.14

                - name: Install dependencies
                  run: bun install --frozen-lockfile

                - name: Verify release gate
                  shell: bash
                  run: |
                    set -o pipefail
                    bun run verify:release 2>&1 | tee release-gate.log

                - name: Upload release gate evidence
                  if: always()
                  uses: actions/upload-artifact@v4
                  with:
                    name: release-gate-${{ github.sha }}
                    path: release-gate.log
                    if-no-files-found: error
                    retention-days: 14
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bun.lock .github/workflows/release-gate.yml
          changed="$(git diff --cached --name-only)"
          printf '%s\n' "$changed"
          test "$changed" = $'.github/workflows/release-gate.yml\nbun.lock'
          git commit -m "fix(psg-01): reconcile sanitizer lockfile"
          git push origin HEAD:${GITHUB_HEAD_REF}

      - name: Verify frozen install
        shell: bash
        run: |
          set -o pipefail
          bun install --frozen-lockfile 2>&1 | tee -a release-gate.log

      - name: Verify release gate
        shell: bash
        run: |
          set -o pipefail
          bun run verify:release 2>&1 | tee -a release-gate.log

      - name: Upload release gate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-${{ github.sha }}
          path: release-gate.log
          if-no-files-found: error
          retention-days: 14
