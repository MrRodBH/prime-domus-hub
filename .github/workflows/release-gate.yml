name: Release Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, build and deterministic route generation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_PUBLISHABLE_KEY: ci-placeholder-key
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-key
      CRON_SECRET: ci-placeholder-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release gate
        run: bun run verify:release
